services:
  - type: web
    name: redtape-backend
    env: python
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      python -m spacy download en_core_web_sm
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.11
      - key: GOOGLE_API_KEY
        sync: false